<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SteamChat — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

<header class="pipe-top">
  <div class="app-title">⚙ STEAMCHAT</div>
  <div class="header-controls">
    <div class="led-group">
      <div class="led"></div>
      <div class="led-label">ONLINE</div>
    </div>
    <div class="gauge-face">
      <div class="gauge-needle"></div>
      <div class="gauge-center"></div>
    </div>
  </div>
</header>

<main class="auth-main">
  <section class="auth-box">
    <div class="auth-head">
      <div class="auth-avatar">⚙️</div>
      <div>
        <h1>Portail d'Authentification</h1>
        <p>Accès au réseau æthérique de SteamChat</p>
      </div>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" onclick="showLogin()">Connexion</button>
      <button class="tab-btn" onclick="showRegister()">Inscription</button>
    </div>

    <!-- Panneau Connexion -->
    <div id="loginPanel" class="auth-panel active">
      <label for="loginUser">Nom de compte</label>
      <div class="input-wrapper">
        <span>👤</span>
        <input id="loginUser" class="form-input" type="text" placeholder="Nom de compte">
      </div>

      <label for="loginPass">Mot de passe</label>
      <div class="input-wrapper">
        <span>🔐</span>
        <input id="loginPass" class="form-input" type="password" placeholder="Mot de passe">
      </div>

      <button class="auth-btn" onclick="login()">Se connecter ➤</button>
    </div>

    <!-- Panneau Inscription -->
    <div id="registerPanel" class="auth-panel">
      <label for="regUser">Nom de compte</label>
      <div class="input-wrapper">
        <span>👤</span>
        <input id="regUser" class="form-input" type="text" placeholder="Choisissez un login">
      </div>

      <label for="regPass">Mot de passe</label>
      <div class="input-wrapper">
        <span>🔐</span>
        <input id="regPass" class="form-input" type="password" placeholder="Choisissez un mot de passe">
      </div>

      <label for="regPass2">Confirmation</label>
      <div class="input-wrapper">
        <span>🗝️</span>
        <input id="regPass2" class="form-input" type="password" placeholder="Confirmez le mot de passe">
      </div>

      <button class="auth-btn" onclick="register()">Créer le compte ⚙️</button>
    </div>
  </section>
</main>

<script>
  const SERVER = "http://172.29.20.76:9000";

  // ── Onglets ──────────────────────────────────────
  function showLogin() {
    document.getElementById("loginPanel").classList.add("active");
    document.getElementById("registerPanel").classList.remove("active");
    document.querySelectorAll(".tab-btn")[0].classList.add("active");
    document.querySelectorAll(".tab-btn")[1].classList.remove("active");
  }

  function showRegister() {
    document.getElementById("loginPanel").classList.remove("active");
    document.getElementById("registerPanel").classList.add("active");
    document.querySelectorAll(".tab-btn")[0].classList.remove("active");
    document.querySelectorAll(".tab-btn")[1].classList.add("active");
  }

  // ── Connexion ────────────────────────────────────
  async function login() {
    const login = document.getElementById("loginUser").value.trim();
    const password = document.getElementById("loginPass").value.trim();

    if (!login || !password) {
      alert("Veuillez remplir tous les champs.");
      return;
    }

    try {
      const res = await fetch(`${SERVER}/connexion`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ login, pasword: password }) // "pasword" sans 's' — correspond au serveur
      });

      const data = await res.json();

      if (res.status === 202) {
        localStorage.setItem("user", JSON.stringify(data.user)); // { id, login }
        window.location.href = "chat.html";
      } else {
        alert(data.message || "Connexion refusée.");
      }
    } catch (err) {
      console.error("Erreur réseau :", err);
      alert("Impossible de joindre le serveur.");
    }
  }

  // ── Inscription ──────────────────────────────────
  async function register() {
    const login = document.getElementById("regUser").value.trim();
    const password = document.getElementById("regPass").value.trim();
    const confirm = document.getElementById("regPass2").value.trim();

    if (!login || !password || !confirm) {
      alert("Veuillez remplir tous les champs.");
      return;
    }

    if (password !== confirm) {
      alert("Les mots de passe ne correspondent pas.");
      return;
    }

    try {
      const res = await fetch(`${SERVER}/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ login, pasword: password }) // "pasword" sans 's' — correspond au serveur
      });

      const data = await res.json();
      alert(data.message || "Réponse reçue.");

      if (res.status === 200) {
        showLogin(); // redirige vers l'onglet connexion après inscription
      }
    } catch (err) {
      console.error("Erreur réseau :", err);
      alert("Impossible de joindre le serveur.");
    }
  }
</script>

</body>
</html>
